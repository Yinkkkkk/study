<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵境·目标游戏化 | 全自定义挑战营</title>
    <!-- Chart.js 轻量图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style id="dynamicThemeVars">
        /* 默认自定义配色 (由用户修改并存储) */
        :root {
            --primary-start: #ff7e5e;
            --primary-end: #feb47b;
            --bg-gradient-start: #1a1f2e;
            --bg-gradient-end: #0c0f1a;
            --card-bg-rgb: 22, 28, 40;
            --card-bg-alpha: 0.75;
            --accent-glow: rgba(255, 126, 94, 0.35);
            --text-light: #f0f3fa;
            --btn-success-start: #2bae66;
            --btn-success-end: #5ad987;
        }
        body {
            background: radial-gradient(circle at 10% 20%, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-light);
        }
        .card {
            background: rgba(var(--card-bg-rgb), var(--card-bg-alpha));
            backdrop-filter: blur(12px);
            border: 1px solid var(--accent-glow);
        }
        button.primary {
            background: linear-gradient(95deg, var(--primary-start), var(--primary-end));
            color: #1f1b2c;
        }
        button.success {
            background: linear-gradient(95deg, var(--btn-success-start), var(--btn-success-end));
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--primary-start), var(--primary-end));
        }
        h3 {
            border-left-color: var(--primary-start);
        }
        .points-hero {
            border: 1px solid var(--primary-start);
            background: linear-gradient(135deg, #1e1b2e, #131725);
        }
        .points-badge span {
            color: var(--primary-end);
        }
        input:focus, select:focus {
            border-color: var(--primary-start);
            box-shadow: 0 0 0 2px rgba(255,126,94,0.3);
        }
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Inter', sans-serif;
            padding: 24px 20px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            border-radius: 2rem;
            padding: 1.3rem 1.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h3 {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-left: 12px;
            letter-spacing: -0.2px;
        }

        button {
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        button.small {
            padding: 5px 12px;
            font-size: 0.7rem;
        }
        button.danger {
            background: #c44536;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        input, select {
            background: #121724;
            border: 1px solid rgba(255,126,94,0.4);
            padding: 8px 14px;
            border-radius: 40px;
            color: #ffe6d5;
            font-size: 0.85rem;
            outline: none;
        }

        .points-hero {
            border-radius: 2.5rem;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        }
        .points-badge {
            background: rgba(255,255,200,0.1);
            backdrop-filter: blur(4px);
            padding: 8px 28px;
            border-radius: 80px;
            font-weight: bold;
            font-size: 1.7rem;
        }
        .points-badge span {
            font-size: 2rem;
            margin-right: 6px;
        }
        .quick-actions {
            display: flex;
            gap: 12px;
        }

        ul {
            list-style: none;
        }
        li {
            background: #0f1621cc;
            margin: 10px 0;
            padding: 8px 14px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,159,110,0.2);
        }

        .log-list {
            max-height: 210px;
            overflow-y: auto;
            font-size: 0.75rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .weight-stats {
            background: #00000030;
            border-radius: 1.5rem;
            padding: 12px;
            margin-top: 10px;
        }

        .three-col-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.6rem;
            margin-bottom: 2rem;
        }

        .wheel-canvas {
            width: 100%;
            max-width: 220px;
            margin: 0 auto;
            display: block;
            cursor: pointer;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .stat-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-bottom: 18px;
        }

        canvas#statsChart {
            max-height: 260px;
            width: 100%;
        }

        .dual-panel {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .sub-panel {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 1.2rem;
            padding: 0.8rem;
        }
        .badge-icon {
            font-size: 1rem;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .color-row label {
            width: 120px;
            font-weight: 500;
        }
        input[type="color"] {
            width: 50px;
            height: 40px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 积分板块（独立区域） -->
    <div class="points-hero">
        <div class="points-badge">
            <span>🏆</span> 我的积分 · <span id="balanceDisplay">0</span>
        </div>
        <div class="quick-actions">
            <button id="openSettingsBtn" class="primary">⚙️ 全局自定义</button>
        </div>
    </div>

    <!-- 三栏核心功能区 -->
    <div class="three-col-grid">
        <!-- 左侧：任务 + 成就 放在一起 -->
        <div class="card">
            <div class="dual-panel">
                <div class="sub-panel">
                    <h3>✅ 每日任务 · 自定义积分</h3>
                    <div class="btn-group" style="margin-bottom: 8px;">
                        <button id="addTaskBtn" class="small success">+ 新建任务</button>
                    </div>
                    <ul id="taskList" style="max-height: 210px; overflow-y: auto;"></ul>
                </div>
                <div class="sub-panel">
                    <h3>🏅 自定义成就</h3>
                    <button id="addAchievementBtn" class="small primary">+ 新建成就</button>
                    <ul id="achievementList" style="max-height: 210px; overflow-y: auto; margin-top: 10px;"></ul>
                </div>
            </div>
        </div>

        <!-- 中间：体重记录 + 体重波动 -->
        <div class="card">
            <h3>⚖️ 体重记录 & 波动趋势</h3>
            <div class="flex-between" style="margin-bottom: 12px;">
                <div>🎯 目标: <strong id="targetWeightSpan">--</strong> kg</div>
                <div>🏁 初始: <strong id="initialWeightSpan">--</strong> kg</div>
            </div>
            <div class="progress-area" style="margin-bottom: 20px;">
                <div class="progress-label"><span>🔥 减肥进度</span><span id="progressPercent">0%</span></div>
                <div class="progress-bar-bg" style="background: #2e3b48; border-radius: 30px; height: 16px;">
                    <div class="progress-fill" id="weightProgressFill" style="width: 0%; height: 100%; border-radius: 30px;"></div>
                </div>
                <div class="flex-between" style="margin-top: 8px;">
                    <span>📉 当前体重: <strong id="latestWeight">--</strong> kg</span>
                    <span>📆 最新记录日</span>
                </div>
            </div>
            <div style="display: flex; gap: 12px; margin: 15px 0 12px;">
                <input type="number" id="weightInput" step="0.1" placeholder="输入今日体重 (kg)" style="flex:2">
                <button id="saveWeightBtn" class="primary">✍️ 记录</button>
            </div>
            <div class="weight-stats">
                <div class="flex-between"><span>📈 最近5次体重</span><span>📊 周均浮动</span></div>
                <div id="weightTrendPreview" style="font-size: 0.75rem; margin-top: 6px;">——</div>
            </div>
        </div>

        <!-- 右侧：转盘 + 积分兑换 + 流水账本 -->
        <div class="card">
            <h3>🎡 幸运大转盘</h3>
            <canvas id="wheelCanvas" width="220" height="220" class="wheel-canvas"></canvas>
            <div class="btn-group" style="justify-content: center; margin: 12px 0 6px;">
                <button id="spinFreeBtn" class="success">✨ 每日免费</button>
                <button id="spinCostBtn" class="primary">🎲 积分抽奖</button>
            </div>
            <div id="wheelHint" style="font-size: 12px; text-align: center;">消耗 <span id="wheelCost">10</span> 积分/次 | 每日1次免费</div>
            
            <h3 style="margin-top: 20px;">🎁 积分兑换奖励</h3>
            <button id="addRewardBtn" class="small primary">+ 自定义奖励</button>
            <ul id="rewardList" style="max-height: 160px; overflow-y: auto;"></ul>

            <h3 style="margin-top: 16px;">📜 流水账本</h3>
            <div class="log-list" id="logList"></div>
        </div>
    </div>

    <!-- 统计单独板块 -->
    <div class="card" style="margin-top: 0.6rem;">
        <h3>📊 专属数据统计 · 体重波动全景</h3>
        <div class="stat-buttons">
            <button id="statDayBtn" class="primary">日视图</button>
            <button id="statWeekBtn">周视图</button>
            <button id="statMonthBtn">月视图</button>
        </div>
        <canvas id="statsChart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    // ---------- 存储 KEY ----------
    const STORAGE = "GoalGameProV2";
    const THEME_STORAGE = "GoalGameTheme";

    // ---------- 默认数据结构 ----------
    let appData = {
        balance: 120,
        totalTaskCompletions: 0,
        initWeight: 70.0,
        targetWeight: 65.0,
        weightRecords: [],     
        tasks: [],            
        achievements: [],     
        transactionLog: [],   
        wheel: {
            costPoints: 12,
            freeSpinsDate: "",
            segments: [
                { name: "+8分", probability: 40, rewardPoints: 8 },
                { name: "+15分", probability: 30, rewardPoints: 15 },
                { name: "+30分", probability: 20, rewardPoints: 30 },
                { name: "再接再厉", probability: 10, rewardPoints: 0 }
            ]
        },
        redeemRewards: [
            { id: "r1", name: "奶茶免胖券", costPoints: 85 },
            { id: "r2", name: "瑜伽周卡", costPoints: 160 },
            { id: "r3", name: "私教体验", costPoints: 250 }
        ]
    };

    // 主题变量初始化
    function loadTheme() {
        let savedTheme = localStorage.getItem(THEME_STORAGE);
        if(savedTheme) {
            let theme = JSON.parse(savedTheme);
            for(let [key, val] of Object.entries(theme)) {
                document.documentElement.style.setProperty(`--${key}`, val);
            }
        } else {
            // 写入默认
            const defaultTheme = {
                "primary-start": "#ff7e5e",
                "primary-end": "#feb47b",
                "bg-gradient-start": "#1a1f2e",
                "bg-gradient-end": "#0c0f1a",
                "card-bg-rgb": "22, 28, 40",
                "card-bg-alpha": "0.75",
                "accent-glow": "rgba(255, 126, 94, 0.35)",
                "text-light": "#f0f3fa",
                "btn-success-start": "#2bae66",
                "btn-success-end": "#5ad987"
            };
            for(let [key, val] of Object.entries(defaultTheme)) {
                document.documentElement.style.setProperty(`--${key}`, val);
            }
            localStorage.setItem(THEME_STORAGE, JSON.stringify(defaultTheme));
        }
    }
    function saveThemeFromModal() {
        const themeObj = {
            "primary-start": document.getElementById("themePrimaryStart").value,
            "primary-end": document.getElementById("themePrimaryEnd").value,
            "bg-gradient-start": document.getElementById("themeBgStart").value,
            "bg-gradient-end": document.getElementById("themeBgEnd").value,
            "card-bg-rgb": document.getElementById("themeCardRgb").value,
            "card-bg-alpha": document.getElementById("themeCardAlpha").value,
            "accent-glow": `rgba(${hexToRgb(document.getElementById("themePrimaryStart").value)}, 0.35)`,
            "text-light": document.getElementById("themeTextLight").value,
            "btn-success-start": document.getElementById("themeSuccessStart").value,
            "btn-success-end": document.getElementById("themeSuccessEnd").value
        };
        for(let [key, val] of Object.entries(themeObj)) {
            document.documentElement.style.setProperty(`--${key}`, val);
        }
        localStorage.setItem(THEME_STORAGE, JSON.stringify(themeObj));
        // 重绘转盘因canvas依赖背景色不变但没影响，刷新图表颜色
        if(statsChart) renderStatsChart(currentStatView);
        drawWheel();
    }
    function hexToRgb(hex) {
        let c = hex.substring(1);
        if(c.length === 3) c = c.split('').map(x=>x+x).join('');
        let intVal = parseInt(c, 16);
        return `${(intVal >> 16) & 255}, ${(intVal >> 8) & 255}, ${intVal & 255}`;
    }

    // 辅助函数
    function getTodayStr() { return new Date().toISOString().slice(0,10); }
    function saveData() { localStorage.setItem(STORAGE, JSON.stringify(appData)); }
    
    function loadData() {
        let raw = localStorage.getItem(STORAGE);
        if(raw) {
            let parsed = JSON.parse(raw);
            appData = { ...appData, ...parsed };
            if(!appData.wheel.freeSpinsDate) appData.wheel.freeSpinsDate = "";
            if(!appData.transactionLog) appData.transactionLog = [];
            if(!appData.totalTaskCompletions) appData.totalTaskCompletions = 0;
            if(!appData.achievements) appData.achievements = [];
            if(!appData.redeemRewards) appData.redeemRewards = [];
            if(!appData.weightRecords) appData.weightRecords = [];
            if(!appData.tasks) appData.tasks = [];
            if(appData.achievements.length === 0) {
                appData.achievements.push({ id:"ach1", name:"减重2kg战神", conditionType:"weightLoss", conditionValue:2, rewardPoints:60, unlocked:false });
                appData.achievements.push({ id:"ach2", name:"坚持达人10次", conditionType:"taskCount", conditionValue:10, rewardPoints:100, unlocked:false });
            }
        } else {
            appData.tasks = [
                { id:"t1", name:"有氧运动30min", points:18, lastCompletedDate:"" },
                { id:"t2", name:"喝够2L水", points:8, lastCompletedDate:"" },
                { id:"t3", name:"健康轻食", points:12, lastCompletedDate:"" }
            ];
            appData.weightRecords = [{ date:getTodayStr(), weight:70.0 }];
            appData.transactionLog = [];
            appData.totalTaskCompletions = 0;
            saveData();
        }
        if(appData.wheel.freeSpinsDate !== getTodayStr()) appData.wheel.freeSpinsDate = "";
        saveData();
    }

    function addPoints(amount, desc) {
        if(amount === 0) return;
        appData.balance += amount;
        appData.transactionLog.unshift({ date: new Date().toLocaleString(), type: amount>0?"收入":"支出", desc, delta: amount });
        if(appData.transactionLog.length > 100) appData.transactionLog.pop();
        saveData();
        refreshUI();
    }

    function checkAchievements() {
        let currentWeight = getCurrentWeight();
        let weightLoss = appData.initWeight - currentWeight;
        let completedTasks = appData.totalTaskCompletions;
        let anyUnlock = false;
        for(let ach of appData.achievements) {
            if(ach.unlocked) continue;
            let conditionMet = false;
            if(ach.conditionType === "weightLoss" && weightLoss >= ach.conditionValue) conditionMet = true;
            if(ach.conditionType === "taskCount" && completedTasks >= ach.conditionValue) conditionMet = true;
            if(conditionMet) {
                ach.unlocked = true;
                addPoints(ach.rewardPoints, `🏅 达成成就「${ach.name}」奖励 ${ach.rewardPoints} 积分`);
                anyUnlock = true;
            }
        }
        if(anyUnlock) refreshUI();
    }

    function getCurrentWeight() {
        if(!appData.weightRecords.length) return appData.initWeight;
        let sorted = [...appData.weightRecords].sort((a,b)=>b.date.localeCompare(a.date));
        return sorted[0].weight;
    }

    function updateProgressBar() {
        let current = getCurrentWeight();
        let init = appData.initWeight;
        let target = appData.targetWeight;
        let totalDiff = init - target;
        if(totalDiff <= 0) totalDiff = 0.001;
        let curDiff = init - current;
        let percent = Math.min(100, Math.max(0, (curDiff / totalDiff) * 100));
        if(current <= target) percent = 100;
        if(init <= target && current <= target) percent = 100;
        document.getElementById("progressPercent").innerText = Math.floor(percent)+"%";
        document.getElementById("weightProgressFill").style.width = percent+"%";
        document.getElementById("latestWeight").innerText = current.toFixed(1);
        document.getElementById("initialWeightSpan").innerText = appData.initWeight.toFixed(1);
        document.getElementById("targetWeightSpan").innerText = appData.targetWeight.toFixed(1);
        let sortedRec = [...appData.weightRecords].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
        let previewDiv = document.getElementById("weightTrendPreview");
        if(sortedRec.length) previewDiv.innerHTML = sortedRec.map(r=>`${r.date.slice(5)}:${r.weight.toFixed(1)}kg`).join("  ·  ");
        else previewDiv.innerHTML = "暂无数据";
    }

    function renderTasks() {
        let container = document.getElementById("taskList");
        let today = getTodayStr();
        container.innerHTML = "";
        appData.tasks.forEach(task => {
            let li = document.createElement("li");
            let completedToday = (task.lastCompletedDate === today);
            li.innerHTML = `<div><b>${task.name}</b>  +${task.points}🏅</div>`;
            let btn = document.createElement("button");
            btn.innerText = completedToday ? "✅ 已完成" : "✔️ 完成";
            btn.disabled = completedToday;
            if(!completedToday) btn.classList.add("success");
            btn.style.fontSize="0.7rem";
            btn.onclick = () => completeTask(task.id);
            li.appendChild(btn);
            container.appendChild(li);
        });
    }

    function completeTask(taskId) {
        let task = appData.tasks.find(t => t.id === taskId);
        if(!task) return;
        let today = getTodayStr();
        if(task.lastCompletedDate === today) { alert("今日已完成该任务啦！"); return; }
        task.lastCompletedDate = today;
        appData.totalTaskCompletions++;
        addPoints(task.points, `✅ 完成任务「${task.name}」 +${task.points}`);
        checkAchievements();
        renderTasks();
        refreshUI();
    }

    function renderAchievements() {
        let container = document.getElementById("achievementList");
        container.innerHTML = "";
        let currentWeight = getCurrentWeight();
        let weightLoss = (appData.initWeight - currentWeight).toFixed(1);
        let taskCount = appData.totalTaskCompletions;
        appData.achievements.forEach(ach => {
            let li = document.createElement("li");
            let condText = ach.conditionType === "weightLoss" ? `减重≥${ach.conditionValue}kg (当前${weightLoss}kg)` : `完成任务≥${ach.conditionValue}次 (${taskCount}次)`;
            li.innerHTML = `<div><b>${ach.name}</b><br><span style="font-size:10px;">${condText}</span></div>
                            <div>🏅 ${ach.unlocked ? "✓已获得" : "🔒未解锁"}<br>🎁 +${ach.rewardPoints}</div>`;
            container.appendChild(li);
        });
    }

    function renderRewards() {
        let container = document.getElementById("rewardList");
        container.innerHTML = "";
        appData.redeemRewards.forEach(reward => {
            let li = document.createElement("li");
            li.innerHTML = `<span>🎁 ${reward.name}  🪙${reward.costPoints}</span>`;
            let btn = document.createElement("button");
            btn.innerText = "兑换";
            btn.classList.add("primary");
            btn.onclick = () => redeemReward(reward.id);
            li.appendChild(btn);
            container.appendChild(li);
        });
    }
    function redeemReward(rewardId) {
        let reward = appData.redeemRewards.find(r => r.id === rewardId);
        if(!reward) return;
        if(appData.balance >= reward.costPoints) {
            addPoints(-reward.costPoints, `🎁 兑换「${reward.name}」 -${reward.costPoints}`);
            alert(`兑换成功! 获得 ${reward.name} 🎉`);
        } else alert("积分不足, 快去完成任务或转盘!");
        refreshUI();
    }

    function renderLogs() {
        let container = document.getElementById("logList");
        container.innerHTML = "";
        appData.transactionLog.slice(0, 28).forEach(log => {
            let div = document.createElement("div");
            div.style.borderBottom="1px solid rgba(255,126,94,0.3)";
            div.style.padding="6px 0";
            div.innerHTML = `<span>${log.date}</span> <span>${log.desc}</span> <span style="color:#f9b86c">${log.delta>0?'+':''}${log.delta}</span>`;
            container.appendChild(div);
        });
    }

    function recordWeight(weight) {
        let today = getTodayStr();
        let existingIndex = appData.weightRecords.findIndex(w => w.date === today);
        if(existingIndex !== -1) appData.weightRecords[existingIndex].weight = weight;
        else appData.weightRecords.push({ date: today, weight });
        appData.weightRecords.sort((a,b)=>b.date.localeCompare(a.date));
        saveData();
        updateProgressBar();
        checkAchievements();
        refreshUI();
        renderStatsChart(currentStatView);
    }

    function drawWheel() {
        let canvas = document.getElementById("wheelCanvas");
        if(!canvas) return;
        let segments = appData.wheel.segments;
        let totalProb = segments.reduce((s,seg)=>s+seg.probability,0);
        let angles = [];
        let startAngle = 0;
        for(let seg of segments) {
            let angle = (seg.probability / totalProb) * Math.PI * 2;
            angles.push({start: startAngle, end: startAngle+angle, name: seg.name, reward: seg.rewardPoints});
            startAngle += angle;
        }
        let ctx = canvas.getContext("2d");
        let w = canvas.width, h = canvas.height, center = w/2, radius = w/2 - 6;
        ctx.clearRect(0,0,w,h);
        let colors = ["#e67e22","#f1c40f","#e84393","#3498db","#2ecc71","#9b59b6"];
        for(let i=0;i<angles.length;i++) {
            let a = angles[i];
            ctx.beginPath();
            ctx.fillStyle = colors[i%colors.length];
            ctx.moveTo(center,center);
            ctx.arc(center,center,radius,a.start,a.end);
            ctx.fill();
            ctx.save();
            ctx.translate(center,center);
            ctx.rotate(a.start + (a.end-a.start)/2);
            ctx.fillStyle = "#fff3e6";
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillText(a.name.length>5?a.name.slice(0,4):a.name, radius/1.6, 5);
            ctx.restore();
        }
        ctx.beginPath();
        ctx.fillStyle = "#2c2e42";
        ctx.arc(center,center,20,0,2*Math.PI);
        ctx.fill();
        ctx.fillStyle="#ffbe76";
        ctx.font="bold 20px sans-serif";
        ctx.fillText("🎲",center-10,center+7);
    }

    function spinWheel(isFree) {
        let today = getTodayStr();
        if(isFree) {
            if(appData.wheel.freeSpinsDate === today) { alert("今日免费机会已用完，明天再来吧~"); return false; }
        } else {
            if(appData.balance < appData.wheel.costPoints) { alert(`积分不足,需要${appData.wheel.costPoints}积分`); return false; }
            addPoints(-appData.wheel.costPoints, `🎡 积分抽奖 -${appData.wheel.costPoints}`);
        }
        let segments = appData.wheel.segments;
        let totalWeight = segments.reduce((s,seg)=>s+seg.probability,0);
        let rand = Math.random() * totalWeight;
        let accum = 0;
        let selected = segments[0];
        for(let seg of segments) {
            accum += seg.probability;
            if(rand <= accum) { selected = seg; break; }
        }
        let reward = selected.rewardPoints;
        let msg = `${selected.name} 获得 ${reward} 积分!`;
        addPoints(reward, `🎰 转盘结果: ${msg}`);
        if(isFree) {
            appData.wheel.freeSpinsDate = today;
            saveData();
        }
        alert(`✨ 转盘结果: ${selected.name}\n${reward>0?`+${reward}积分`:"下次好运哦~"}`);
        refreshUI();
        return true;
    }

    let statsChart = null;
    let currentStatView = "day";
    function renderStatsChart(view) {
        if(statsChart) statsChart.destroy();
        let ctx = document.getElementById("statsChart").getContext("2d");
        let records = [...appData.weightRecords].sort((a,b)=>a.date.localeCompare(b.date));
        if(records.length === 0) return;
        let labels = [], data = [];
        if(view === "day") {
            labels = records.map(r=>r.date.slice(5));
            data = records.map(r=>r.weight);
        } else if(view === "week") {
            let weekly = {};
            records.forEach(r=>{
                let weekKey = getWeekNumber(r.date);
                if(!weekly[weekKey]) weekly[weekKey] = { sum:0, count:0, label:weekKey };
                weekly[weekKey].sum += r.weight;
                weekly[weekKey].count++;
            });
            labels = Object.keys(weekly).sort();
            data = labels.map(k=> weekly[k].sum/weekly[k].count);
        } else {
            let monthly = {};
            records.forEach(r=>{
                let mon = r.date.slice(0,7);
                if(!monthly[mon]) monthly[mon] = { sum:0, count:0 };
                monthly[mon].sum += r.weight;
                monthly[mon].count++;
            });
            labels = Object.keys(monthly).sort();
            data = labels.map(m=> monthly[m].sum/monthly[m].count);
        }
        const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-start').trim();
        statsChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: '体重 (kg)', data, borderColor: primaryColor || '#ff9966', backgroundColor: primaryColor+'30', tension: 0.2, fill: true, pointBackgroundColor: primaryColor }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#f0e6d0' } } } }
        });
    }
    function getWeekNumber(dateStr) {
        let d = new Date(dateStr);
        d.setHours(0,0,0,0);
        let yearStart = new Date(d.getFullYear(),0,1);
        let week = Math.ceil(((d - yearStart) / 86400000 + yearStart.getDay())/7);
        return `${d.getFullYear()}-W${week}`;
    }

    function refreshUI() {
        document.getElementById("balanceDisplay").innerText = appData.balance;
        updateProgressBar();
        renderTasks();
        renderAchievements();
        renderRewards();
        renderLogs();
        drawWheel();
        document.getElementById("wheelCost").innerText = appData.wheel.costPoints;
        renderStatsChart(currentStatView);
    }

    // 全局自定义模态框（含完整配色管理）
    function openSettingsModal() {
        let modalDiv = document.createElement('div');
        modalDiv.id = "dynamicModal";
        modalDiv.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;";
        modalDiv.innerHTML = `<div style="background:#1e293b;width:90%;max-width:720px;border-radius:32px;padding:22px;max-height:85vh;overflow:auto;border:1px solid #ff7e5e;">
            <h2>🎛️ 全局自定义 · 含主题配色</h2>
            <div style="background:#0f172a; border-radius:24px; padding:12px; margin-bottom:16px;">
                <h3>🎨 自定义主题配色 (实时预览)</h3>
                <div class="color-row"><label>主色起点</label><input type="color" id="themePrimaryStart" value="${getCssVar('primary-start', '#ff7e5e')}"></div>
                <div class="color-row"><label>主色终点</label><input type="color" id="themePrimaryEnd" value="${getCssVar('primary-end', '#feb47b')}"></div>
                <div class="color-row"><label>背景渐变起始</label><input type="color" id="themeBgStart" value="${getCssVar('bg-gradient-start', '#1a1f2e')}"></div>
                <div class="color-row"><label>背景渐变结束</label><input type="color" id="themeBgEnd" value="${getCssVar('bg-gradient-end', '#0c0f1a')}"></div>
                <div class="color-row"><label>卡片背景RGB</label><input type="text" id="themeCardRgb" value="${getCssVar('card-bg-rgb', '22, 28, 40')}" placeholder="22,28,40"></div>
                <div class="color-row"><label>卡片透明度</label><input type="range" id="themeCardAlpha" min="0.5" max="0.95" step="0.01" value="${getCssVar('card-bg-alpha', '0.75')}"></div>
                <div class="color-row"><label>成功按钮起始</label><input type="color" id="themeSuccessStart" value="${getCssVar('btn-success-start', '#2bae66')}"></div>
                <div class="color-row"><label>成功按钮结束</label><input type="color" id="themeSuccessEnd" value="${getCssVar('btn-success-end', '#5ad987')}"></div>
                <div class="color-row"><label>文字亮色</label><input type="color" id="themeTextLight" value="${getCssVar('text-light', '#f0f3fa')}"></div>
                <button id="applyThemeBtn" class="primary" style="margin-top:8px;">✨ 应用配色并保存</button>
            </div>
            <h3>⚙️ 游戏数据自定义</h3>
            <div><label>初始体重</label><input id="setInitWeight" type="number" step="0.1" value="${appData.initWeight}"></div>
            <div><label>目标体重</label><input id="setTargetWeight" type="number" step="0.1" value="${appData.targetWeight}"></div>
            <h3>✏️ 任务列表</h3><ul id="taskEditList"></ul><button id="newTaskBtnModal">+ 新增任务</button>
            <h3>🏅 成就列表</h3><ul id="achEditList"></ul><button id="newAchBtnModal">+ 新增成就</button>
            <h3>🎡 转盘消耗&奖品</h3><div>单次积分: <input id="wheelCostSet" value="${appData.wheel.costPoints}"></div><div id="segmentsList"></div><button id="addSegmentBtn">+ 添加奖品</button>
            <h3>🎁 兑换奖励</h3><ul id="rewardEditList"></ul><button id="newRewardBtnModal">+ 新增兑换</button>
            <div style="margin-top:20px;"><button id="closeModalBtn" class="primary">保存并关闭</button></div>
        </div>`;
        document.body.appendChild(modalDiv);

        function refreshModalItems() {
            let taskContainer = document.getElementById("taskEditList");
            taskContainer.innerHTML = "";
            appData.tasks.forEach((t,idx)=>{
                let li = document.createElement("li"); li.innerHTML = `<input value="${t.name}" id="tname${idx}"> +<input value="${t.points}" id="tpoints${idx}" type="number" style="width:70px;"> <button class="danger delTaskBtn" data-id="${t.id}">删除</button>`;
                taskContainer.appendChild(li);
            });
            document.querySelectorAll(".delTaskBtn").forEach(btn=>btn.onclick=()=>{ appData.tasks=appData.tasks.filter(t=>t.id!==btn.getAttribute("data-id")); refreshModalItems(); saveData(); });
            let achContainer = document.getElementById("achEditList");
            achContainer.innerHTML = "";
            appData.achievements.forEach((ach,idx)=>{
                let li = document.createElement("li");
                li.innerHTML = `<input value="${ach.name}" id="aname${idx}"> <select id="atype${idx}"><option ${ach.conditionType==="weightLoss"?"selected":""}>weightLoss</option><option ${ach.conditionType==="taskCount"?"selected":""}>taskCount</option></select> 阈值<input value="${ach.conditionValue}" id="aval${idx}" type="number" style="width:60px;"> 奖励积分<input value="${ach.rewardPoints}" id="apoints${idx}" type="number"><button class="danger delAchBtn" data-id="${ach.id}">删</button>`;
                achContainer.appendChild(li);
            });
            document.querySelectorAll(".delAchBtn").forEach(btn=>btn.onclick=()=>{ appData.achievements=appData.achievements.filter(a=>a.id!==btn.getAttribute("data-id")); refreshModalItems(); saveData(); });
            let rewContainer = document.getElementById("rewardEditList");
            rewContainer.innerHTML = "";
            appData.redeemRewards.forEach((r,idx)=>{
                let li = document.createElement("li");
                li.innerHTML = `<input value="${r.name}" id="rname${idx}"> 积分<input value="${r.costPoints}" id="rcost${idx}" type="number"><button class="danger delRewBtn" data-id="${r.id}">删除</button>`;
                rewContainer.appendChild(li);
            });
            document.querySelectorAll(".delRewBtn").forEach(btn=>btn.onclick=()=>{ appData.redeemRewards=appData.redeemRewards.filter(r=>r.id!==btn.getAttribute("data-id")); refreshModalItems(); saveData(); });
            let segDiv = document.getElementById("segmentsList");
            segDiv.innerHTML = "";
            appData.wheel.segments.forEach((seg,idx)=>{
                let div = document.createElement("div");
                div.innerHTML = `名称<input value="${seg.name}" id="segName${idx}"> 权重<input value="${seg.probability}" type="number" id="segProb${idx}"> 奖励积分<input value="${seg.rewardPoints}" type="number" id="segRew${idx}"><button class="danger delSegBtn" data-idx="${idx}">移除</button>`;
                segDiv.appendChild(div);
            });
            document.querySelectorAll(".delSegBtn").forEach(btn=>btn.onclick=()=>{ appData.wheel.segments.splice(parseInt(btn.getAttribute("data-idx")),1); refreshModalItems(); saveData(); });
        }
        refreshModalItems();
        document.getElementById("newTaskBtnModal").onclick = ()=>{ appData.tasks.push({ id:Date.now()+"", name:"新任务", points:12, lastCompletedDate:"" }); refreshModalItems(); saveData(); };
        document.getElementById("newAchBtnModal").onclick = ()=>{ appData.achievements.push({ id:"ach"+Date.now(), name:"新里程碑", conditionType:"taskCount", conditionValue:5, rewardPoints:50, unlocked:false }); refreshModalItems(); saveData(); };
        document.getElementById("newRewardBtnModal").onclick = ()=>{ appData.redeemRewards.push({ id:"r"+Date.now(), name:"梦幻奖品", costPoints:120 }); refreshModalItems(); saveData(); };
        document.getElementById("addSegmentBtn").onclick = ()=>{ appData.wheel.segments.push({ name:"神秘礼", probability:15, rewardPoints:25 }); refreshModalItems(); saveData(); };
        
        document.getElementById("applyThemeBtn").onclick = ()=>{
            saveThemeFromModal();
            drawWheel(); if(statsChart) renderStatsChart(currentStatView);
        };
        document.getElementById("closeModalBtn").onclick = ()=>{
            let newInit = parseFloat(document.getElementById("setInitWeight").value);
            let newTarget = parseFloat(document.getElementById("setTargetWeight").value);
            if(!isNaN(newInit)) appData.initWeight = newInit;
            if(!isNaN(newTarget)) appData.targetWeight = newTarget;
            for(let i=0;i<appData.tasks.length;i++) { let nameInp = document.getElementById(`tname${i}`); let ptsInp = document.getElementById(`tpoints${i}`); if(nameInp) appData.tasks[i].name = nameInp.value; if(ptsInp) appData.tasks[i].points = parseInt(ptsInp.value)||0; }
            for(let i=0;i<appData.achievements.length;i++) { let nameI=document.getElementById(`aname${i}`); let typeI=document.getElementById(`atype${i}`); let valI=document.getElementById(`aval${i}`); let ptsI=document.getElementById(`apoints${i}`); if(nameI) appData.achievements[i].name=nameI.value; if(typeI) appData.achievements[i].conditionType=typeI.value; if(valI) appData.achievements[i].conditionValue=parseFloat(valI.value); if(ptsI) appData.achievements[i].rewardPoints=parseInt(ptsI.value); }
            for(let i=0;i<appData.redeemRewards.length;i++) { let rn=document.getElementById(`rname${i}`); let rc=document.getElementById(`rcost${i}`); if(rn) appData.redeemRewards[i].name=rn.value; if(rc) appData.redeemRewards[i].costPoints=parseInt(rc.value); }
            appData.wheel.costPoints = parseInt(document.getElementById("wheelCostSet").value)||10;
            for(let i=0;i<appData.wheel.segments.length;i++) { let segName=document.getElementById(`segName${i}`); let segProb=document.getElementById(`segProb${i}`); let segRew=document.getElementById(`segRew${i}`); if(segName) appData.wheel.segments[i].name=segName.value; if(segProb) appData.wheel.segments[i].probability=parseFloat(segProb.value); if(segRew) appData.wheel.segments[i].rewardPoints=parseInt(segRew.value); }
            saveThemeFromModal(); // 再次保存配色
            saveData(); refreshUI(); modalDiv.remove();
        };
    }
    function getCssVar(varName, fallback) {
        let val = getComputedStyle(document.documentElement).getPropertyValue(`--${varName}`).trim();
        return val || fallback;
    }

    function bindEvents() {
        document.getElementById("saveWeightBtn").onclick = ()=>{ let w = parseFloat(document.getElementById("weightInput").value); if(isNaN(w)) alert("请输入有效体重"); else recordWeight(w); document.getElementById("weightInput").value=""; };
        document.getElementById("addTaskBtn").onclick = ()=>{ let newName = prompt("任务名称","晨跑打卡"); if(newName){ appData.tasks.push({ id:Date.now()+"", name:newName, points:12, lastCompletedDate:"" }); saveData(); refreshUI(); } };
        document.getElementById("addAchievementBtn").onclick = ()=>{ let name = prompt("成就名称","自律王者"); let type = confirm("类型: 确定=减重(kg) 取消=任务次数")?"weightLoss":"taskCount"; let val = parseFloat(prompt("目标值","3")); let pts = parseInt(prompt("奖励积分","80")); if(name && val) appData.achievements.push({ id:"ach"+Date.now(), name, conditionType:type, conditionValue:val, rewardPoints:pts||50, unlocked:false }); saveData(); refreshUI(); };
        document.getElementById("addRewardBtn").onclick = ()=>{ let name = prompt("兑换奖励","健身弹力带"); let cost = parseInt(prompt("所需积分","110")); if(name && cost) appData.redeemRewards.push({ id:"r"+Date.now(), name, costPoints:cost }); saveData(); refreshUI(); };
        document.getElementById("spinFreeBtn").onclick = ()=> spinWheel(true);
        document.getElementById("spinCostBtn").onclick = ()=> spinWheel(false);
        document.getElementById("openSettingsBtn").onclick = openSettingsModal;
        document.getElementById("statDayBtn").onclick = ()=>{ currentStatView="day"; renderStatsChart("day"); };
        document.getElementById("statWeekBtn").onclick = ()=>{ currentStatView="week"; renderStatsChart("week"); };
        document.getElementById("statMonthBtn").onclick = ()=>{ currentStatView="month"; renderStatsChart("month"); };
    }

    function init() {
        loadTheme();
        loadData();
        bindEvents();
        refreshUI();
    }
    init();
</script>
